<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>&TEAM 歌曲二選一大賽</title>
    <style>
        :root {
            --primary-pink: #ffb7c5;
            --primary-yellow: #ffe89e;
            --dark-gray: #333333;
            --bg-gradient: linear-gradient(135deg, #fff5f5 0%, #fffde6 100%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--dark-gray);
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            letter-spacing: 2px;
            color: #444;
        }

        .round-title {
            font-size: 1.2rem;
            font-weight: bold;
            color: #777;
            margin-bottom: 5px;
        }

        .progress-container {
            width: 100%;
            height: 8px;
            background: #eee;
            border-radius: 4px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--primary-pink), var(--primary-yellow));
            transition: width 0.3s ease;
        }

        .game-zone {
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }

        .vs-circle {
            background: #fff;
            border: 2px solid #ddd;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-style: italic;
            color: #aaa;
            flex-shrink: 0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            z-index: 10;
        }

        .song-card {
            flex: 1;
            background: white;
            border: 3px solid transparent;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 15px;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 6px 15px rgba(0,0,0,0.03);
            min-height: 180px;
        }

        .song-title {
            font-size: 1.3rem;
            font-weight: 600;
            word-break: break-word;
            line-height: 1.4;
        }

        .song-card:first-child:hover {
            transform: translateY(-5px);
            border-color: var(--primary-pink);
            box-shadow: 0 12px 20px rgba(255, 183, 197, 0.4);
        }

        .song-card:last-child:hover {
            transform: translateY(-5px);
            border-color: var(--primary-yellow);
            box-shadow: 0 12px 20px rgba(255, 232, 158, 0.6);
        }

        .result-zone {
            display: none;
        }

        .winner-crown {
            font-size: 4rem;
            margin-bottom: 10px;
        }

        .winner-name {
            font-size: 2.2rem;
            font-weight: bold;
            margin: 20px 0;
            background: linear-gradient(45deg, #ff6b8b, #ffca28);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .restart-btn {
            background: #444;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1rem;
            border-radius: 25px;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 20px;
        }

        .restart-btn:hover {
            background: #222;
        }

        @media (max-width: 600px) {
            .game-zone {
                flex-direction: column;
                gap: 15px;
                width: 100%;
            }
            .vs-circle {
                margin: -5px 0;
            }
            .song-card {
                width: 100%;
                min-height: 140px;
                padding: 30px 10px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="game-ui">
        <h1>&TEAM 歌曲二選一</h1>
        <div class="round-title" id="round-text">32 強賽 (1 / 16)</div>
        <div class="progress-container">
            <div class="progress-bar" id="progress"></div>
        </div>

        <div class="game-zone">
            <div class="song-card" id="card-a" onclick="selectSong(0)">
                <div class="song-title" id="title-a">載入中...</div>
            </div>
            <div class="vs-circle">VS</div>
            <div class="song-card" id="card-b" onclick="selectSong(1)">
                <div class="song-title" id="title-b">載入中...</div>
            </div>
        </div>
    </div>

    <div class="result-zone" id="result-ui">
        <div class="winner-crown">👑</div>
        <h2>你心中最愛的 &TEAM
