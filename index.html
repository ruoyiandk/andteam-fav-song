<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>&TEAM 歌曲二選一大賽</title>
    <script src="https://www.youtube.com/iframe_api"></script>
    <style>
        :root {
            --primary-pink: #ffb7c5;
            --primary-yellow: #ffe89e;
            --dark-gray: #333333;
            --bg-gradient: linear-gradient(135deg, #fff5f5 0%, #fffde6 100%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--dark-gray);
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            letter-spacing: 2px;
            color: #444;
        }

        .round-title {
            font-size: 1.2rem;
            font-weight: bold;
            color: #777;
            margin-bottom: 5px;
        }

        .progress-container {
            width: 100%;
            height: 8px;
            background: #eee;
            border-radius: 4px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--primary-pink), var(--primary-yellow));
            transition: width 0.3s ease;
        }

        .game-zone {
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }

        .vs-circle {
            background: #fff;
            border: 2px solid #ddd;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-style: italic;
            color: #aaa;
            flex-shrink: 0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            z-index: 10;
        }

        .song-card {
            flex: 1;
            background: white;
            border: 3px solid transparent;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 15px;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 6px 15px rgba(0,0,0,0.03);
            overflow: hidden;
        }

            width: 100%;
            aspect-ratio: 1
